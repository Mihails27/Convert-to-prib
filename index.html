<script>
const rates = {
    prib_usd: 0.64,
    prib_rub: 23,
    usd_eur: 0.91,
    usd_gbp: 0.8,
    usd_jpy: 150
};

const input = document.getElementById("input");
const resultEl = document.getElementById("result");

input.addEventListener("input", safeConvert);
input.addEventListener("keydown", e => {
    if (e.key === "Enter") safeConvert();
});

function safeConvert() {
    try {
        convert();
    } catch (e) {
        resultEl.innerText = "Ошибка обработки";
        console.error(e);
    }
}

function normalize(text) {
    return text.toLowerCase()
        .replace(",", ".")
        .replace(/миллиард(ов|а)?/g, "e9")
        .replace(/миллион(ов|а)?/g, "e6")
        .replace(/тысяч(и)?/g, "e3")
        .replace(/k/g, "e3")
        .replace(/m/g, "e6")
        .replace(/b/g, "e9")
        .replace(/доллар(ов|а)?|usd/g, "usd")
        .replace(/руб(лей|ля|ли)?|₽/g, "rub")
        .replace(/евро|eur/g, "eur")
        .replace(/фунт(ов|а)?|gbp/g, "gbp")
        .replace(/иен(ы)?|jpy/g, "jpy")
        .replace(/приб(ов|а)?/g, "prib");
}

function extractNumber(text) {
    let match = text.match(/[\d.]+(e\d+)?/);
    return match ? Number(match[0]) : null;
}

function detect(str) {
    if (!str) return null;
    if (str.includes("usd")) return "usd";
    if (str.includes("rub")) return "rub";
    if (str.includes("eur")) return "eur";
    if (str.includes("gbp")) return "gbp";
    if (str.includes("jpy")) return "jpy";
    if (str.includes("prib")) return "prib";
    return null;
}

function convert() {
    let raw = input.value;
    let text = normalize(raw);

    let num = extractNumber(text);
    if (!num) {
        resultEl.innerText = "Не понял число";
        return;
    }

    let parts = text.split("в");
    let from = parts[0];
    let to = parts[1];

    let fromCur = detect(from);
    let toCur = detect(to) || "prib";

    if (!fromCur) {
        resultEl.innerText = "Не понял валюту";
        return;
    }

    let result;

    if (toCur === "prib") {
        switch(fromCur) {
            case "usd": result = num / 0.64; break;
            case "rub": result = num / 23; break;
            case "eur": result = num / (0.64 * 0.91); break;
            case "gbp": result = num / (0.64 * 0.8); break;
            case "jpy": result = num / (0.64 / 150); break;
            case "prib": result = num; break;
        }
        resultEl.innerText = format(result) + " прибов";
    }

    else if (fromCur === "prib") {
        switch(toCur) {
            case "usd": result = num * 0.64; break;
            case "rub": result = num * 23; break;
            case "eur": result = num * 0.64 * 0.91; break;
            case "gbp": result = num * 0.64 * 0.8; break;
            case "jpy": result = num * 0.64 / 150; break;
        }
        resultEl.innerText = format(result) + " " + toCur.toUpperCase();
    }

    else {
        resultEl.innerText = "Только через приб";
    }
}

// красивое форматирование
function format(num) {
    if (num >= 1e9) return (num/1e9).toFixed(2) + " млрд";
    if (num >= 1e6) return (num/1e6).toFixed(2) + " млн";
    if (num >= 1e3) return (num/1e3).toFixed(2) + " тыс";
    return num.toFixed(2);
}
</script>
